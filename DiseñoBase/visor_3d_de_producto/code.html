<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>3D Product Viewer</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-dim": "#131313",
                        "on-secondary-container": "#b7b5b4",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed": "#e2e2e2",
                        "primary-fixed": "#ffdad8",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary-container": "#282a2a",
                        "error-container": "#93000a",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-surface-variant": "#e4bebc",
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#313030",
                        "secondary-container": "#474746",
                        "surface-bright": "#3a3939",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-tint": "#ffb3b1",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "secondary-fixed-dim": "#c8c6c5",
                        "error": "#ffb4ab",
                        "on-surface": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "on-secondary-fixed-variant": "#474746",
                        "secondary": "#c8c6c5",
                        "surface": "#131313",
                        "inverse-primary": "#bb152c",
                        "on-primary-fixed": "#410007",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-container": "#5b000e",
                        "on-primary-fixed-variant": "#92001c",
                        "primary-container": "#ff535b",
                        "tertiary-container": "#909191",
                        "background": "#131313",
                        "primary-fixed-dim": "#ffb3b1",
                        "outline": "#ab8987",
                        "on-error": "#690005",
                        "outline-variant": "#5b403f",
                        "surface-variant": "#353534",
                        "on-primary": "#680011",
                        "tertiary": "#c6c6c7",
                        "on-tertiary": "#2f3131",
                        "on-background": "#e5e2e1",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary": "#313030",
                        "primary": "#ffb3b1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "40px",
                        "lg": "24px",
                        "unit": "4px",
                        "sm": "8px",
                        "xxl": "64px",
                        "gutter": "16px",
                        "margin": "20px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Space Grotesk"],
                        "h3": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased overflow-hidden h-screen w-full relative flex flex-col selection:bg-primary/30">
<!-- Ambient Background Grid (Cyberpunk Lite feel) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[linear-gradient(to_right,#ffffff1a_1px,transparent_1px),linear-gradient(to_bottom,#ffffff1a_1px,transparent_1px)] bg-[size:64px_64px]"></div>
<!-- Top Action Bar (Close Only) -->
<div class="absolute top-0 left-0 w-full z-50 flex justify-end p-lg pointer-events-auto">
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-container/50 backdrop-blur-xl border border-white/10 text-on-surface hover:bg-surface-container hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Main 3D Viewer Canvas -->
<div class="flex-1 relative z-10 flex flex-col items-center justify-center w-full h-full">
<!-- UI Brackets (Tech aesthetic) -->
<div class="absolute top-1/4 left-[10%] w-8 h-8 border-t-2 border-l-2 border-primary/30"></div>
<div class="absolute bottom-1/4 right-[10%] w-8 h-8 border-b-2 border-r-2 border-primary/30"></div>
<!-- Central Glow / Pedestal -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary-container/10 rounded-full blur-[80px]"></div>
<!-- 3D Model Placeholder -->
<div class="relative w-full max-w-[500px] aspect-square flex items-center justify-center">
<!-- Simulated floating effect container -->
<div class="w-[80%] h-[80%] relative z-20 transition-transform duration-1000 ease-in-out hover:scale-105">
<img alt="3D Burger Render" class="w-full h-full object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)] filter brightness-110 contrast-125" data-alt="A highly detailed, ultra-realistic 3D render of a premium gourmet double smash burger floating in mid-air. The lighting is dramatic and cyberpunk-inspired, featuring high-contrast neon red rim lighting that emphasizes the glossy textures of the brioche bun, the dripping golden melted cheese, and the charred, juicy beef patties against a pitch-black void. The mood is futuristic, bold, and incredibly appetizing, rendered in 8k resolution with a sleek, high-end commercial aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJa2LyeRW27tx0k-yGPNNkiGIoMsLHYHnK5kiYqM3SMKzw0HG-P3UzkvVpXQYpzu8iUyvomLPZBbvbi9N8QQa8DrtX5R1prkmkAIkK5PNQ6ZD4slD78dMyY_28-93Mma_F-CWjE7XmOmmAdm2PYt3I0XIfaqCRbmKUyvfjCIZcJlr-NWooF72_WHs-r2EDYlj6E69Qsxpem6glBkdXYMehctin_RpbOz53PHZYQXAMXGxQvmslydOIstHf2tX3UAzmn-2fJO2VOw"/>
</div>
<!-- Shadow projection -->
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-48 h-8 bg-black/80 rounded-[100%] blur-md"></div>
</div>
<!-- Floating Controls (Rotate / Zoom) -->
<div class="absolute right-lg top-1/2 -translate-y-1/2 flex flex-col gap-md z-30 pointer-events-auto">
<button class="flex flex-col items-center justify-center gap-xs p-md bg-surface-container/60 backdrop-blur-xl border border-white/5 rounded-xl text-on-surface-variant hover:text-primary hover:border-primary/30 hover:bg-surface-container transition-all group">
<span class="material-symbols-outlined text-[32px] group-hover:scale-110 transition-transform">360</span>
<span class="font-label-caps text-label-caps uppercase tracking-widest">Rotate</span>
</button>
<button class="flex flex-col items-center justify-center gap-xs p-md bg-surface-container/60 backdrop-blur-xl border border-white/5 rounded-xl text-on-surface-variant hover:text-primary hover:border-primary/30 hover:bg-surface-container transition-all group">
<span class="material-symbols-outlined text-[32px] group-hover:scale-110 transition-transform">zoom_in</span>
<span class="font-label-caps text-label-caps uppercase tracking-widest">Zoom</span>
</button>
</div>
</div>
<!-- Bottom Product Detail Panel (Glassmorphism) -->
<div class="relative z-40 w-full bg-surface-container/80 backdrop-blur-2xl border-t border-white/10 rounded-t-[32px] p-lg md:p-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-xl shadow-[0_-20px_40px_rgba(0,0,0,0.5)]">
<!-- Left: Details -->
<div class="flex flex-col gap-sm w-full md:w-auto">
<div class="flex items-center gap-sm mb-xs">
<span class="px-sm py-xs bg-surface-bright/50 border border-white/10 rounded-full font-label-caps text-label-caps text-on-surface-variant uppercase">Signature Series</span>
<span class="px-sm py-xs bg-primary/20 border border-primary/30 rounded-full font-label-caps text-label-caps text-primary uppercase">Spicy</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface uppercase tracking-tighter m-0 leading-none">Cyber Smash</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mt-xs">Double wagyu beef patty, neon-spiced aioli, sharp cheddar, artisan black brioche bun.</p>
</div>
<!-- Right: Price & CTA -->
<div class="flex flex-col md:flex-row items-center gap-lg w-full md:w-auto shrink-0 mt-md md:mt-0">
<div class="flex flex-col items-end w-full md:w-auto">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Total</span>
<span class="font-h1 text-h1 text-primary-container leading-none">$24.00</span>
</div>
<button class="w-full md:w-auto flex items-center justify-center gap-sm px-xxl py-lg bg-primary-container text-on-primary-container font-h3 text-h3 uppercase rounded-xl shadow-[0_0_25px_rgba(255,83,91,0.3)] hover:shadow-[0_0_35px_rgba(255,83,91,0.5)] hover:bg-primary transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
                Agregar al Pedido
            </button>
</div>
</div>
</body></html>
