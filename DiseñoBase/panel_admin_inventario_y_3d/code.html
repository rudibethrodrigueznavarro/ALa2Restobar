<style>
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-glow:focus-within {
            border-color: #ff535b;
            box-shadow: 0 0 15px rgba(255, 83, 91, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-white pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-md h-16 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(230,57,70,0.2)] transition-opacity duration-200">
<button class="flex items-center justify-center p-sm hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary dark:text-primary">menu</span>
</button>
<h1 class="font-h2 text-h2 uppercase tracking-tighter text-primary dark:text-primary truncate px-md">A LA 2 RESTO-BAR</h1>
<button class="flex items-center justify-center p-sm hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary dark:text-primary">shopping_cart</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-20 px-md flex flex-col gap-xl max-w-2xl mx-auto w-full">
<!-- Inventory List Section -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-end mb-sm">
<h2 class="font-h3 text-h3 text-on-surface">Inventory</h2>
<span class="font-label-caps text-label-caps text-on-surface-variant">24 Items</span>
</div>
<!-- Product Card 1 -->
<div class="glass-panel rounded-xl p-sm flex items-center gap-md relative overflow-hidden group">
<div class="w-20 h-20 rounded-lg overflow-hidden shrink-0 bg-surface-variant relative">
<img class="w-full h-full object-cover mix-blend-luminosity opacity-80 group-hover:mix-blend-normal group-hover:opacity-100 transition-all duration-300" data-alt="A high-end, cyberpunk-inspired gourmet burger presented on a dark slate surface. The lighting is moody and dramatic, featuring stark contrasting shadows and a subtle underglow of vibrant neon red. The background is a deeply blurred, dark nocturnal resto-bar environment with sleek glass surfaces and minimal reflections. The overall aesthetic is ultra-modern, appetizing, and fits a premium, tech-forward culinary experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCkzFdl-Bgj5VNHtq9-BzqkPpvIRAODpW-WN3F573pvZMd5a2qmES7xiN-UFfq_oRdZlzNPM1IFaMtpMPsWyCLeE1LbH9jVqGGzwjRnfb-pQxg8lDIvMJ5kHq7i1b2-UhLdplHZD7AxEfy7oH3MzqM14c7H7V5xw9xjjUAxU_OxDb51waemqUqUZVaXyegWNHzGDjkhMy0Ps1seKFhjAUrb_MbhKX8kElVotVU9bf5WAJihvmdezXAfXOghpxf4cJBs1vBfDFu2g"/>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-2 mb-xs">
<span class="font-label-caps text-label-caps bg-primary-container/20 text-primary-container px-2 py-1 rounded-full text-[10px]">Mains</span>
</div>
<h3 class="font-h3 text-lg text-on-surface truncate">Neon Blaze Burger</h3>
<p class="font-h3 text-body-md text-primary">$18.50</p>
</div>
<div class="flex flex-col gap-sm shrink-0">
<button class="w-8 h-8 rounded-full bg-surface flex items-center justify-center text-on-surface hover:text-primary hover:shadow-[0_0_10px_rgba(255,83,91,0.3)] transition-all border border-white/5">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="w-8 h-8 rounded-full bg-surface flex items-center justify-center text-on-surface hover:text-primary hover:shadow-[0_0_10px_rgba(255,83,91,0.3)] transition-all border border-white/5">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Product Card 2 -->
<div class="glass-panel rounded-xl p-sm flex items-center gap-md relative overflow-hidden group opacity-60">
<div class="w-20 h-20 rounded-lg overflow-hidden shrink-0 bg-surface-variant relative">
<img class="w-full h-full object-cover grayscale" data-alt="A stunning, vibrant red neon cocktail served in a pristine geometric glass, resting on a matte black bar counter. Soft, atmospheric light-mode glows emanate from the drink itself, contrasting beautifully against the deep, pitch-black backdrop of a high-end urban resto-bar. The scene incorporates glassmorphism elements in the blurred background, emphasizing a clean, minimalist, and deeply immersive premium nightlife atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNaNsF4ntdyGkHhq1bGLxCcgsK7Z288GH6nzOV-5XbfS11Z1PwzEnoGKVQaIL2uFiyV9uIRrb_cLQJBsdnRX-JyGCwW35fGatC0rm4K04duEh9yLSkp8SYmdQAvHBIOFBWEhBsOrnxaXWTDd84zlMMii0GND9lrL_Vip-RneBIwL-v43RoYN7KB5jvQBNUfZ1RBbkyL3bn6-1yxUfgDrtghpTOdQzvZR_7kY4WFy0-S-cThnIPsUjSLTMQW7I3iGW8QohC_PZvYg"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center">
<span class="font-label-caps text-label-caps text-white bg-black/80 px-2 py-1 rounded">Hidden</span>
</div>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-2 mb-xs">
<span class="font-label-caps text-label-caps bg-surface-variant text-on-surface-variant px-2 py-1 rounded-full text-[10px]">Drinks</span>
</div>
<h3 class="font-h3 text-lg text-on-surface-variant truncate line-through">Crimson Void Cocktail</h3>
<p class="font-h3 text-body-md text-on-surface-variant">$14.00</p>
</div>
<div class="flex flex-col gap-sm shrink-0">
<button class="w-8 h-8 rounded-full bg-surface flex items-center justify-center text-on-surface hover:text-primary hover:shadow-[0_0_10px_rgba(255,83,91,0.3)] transition-all border border-white/5">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="w-8 h-8 rounded-full bg-surface flex items-center justify-center text-on-surface hover:text-primary hover:shadow-[0_0_10px_rgba(255,83,91,0.3)] transition-all border border-white/5">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
</section>
<!-- Divider -->
<div class="w-full h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<!-- Add Product Form Section -->
<section class="glass-panel rounded-xl p-md flex flex-col gap-lg relative overflow-hidden">
<!-- Decorative Glow -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container/20 rounded-full blur-[40px] pointer-events-none"></div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[28px]">add_box</span>
<h2 class="font-h3 text-h3 text-on-surface">Add New Product</h2>
</div>
<form class="flex flex-col gap-md">
<!-- Name & Price Row -->
<div class="flex gap-md">
<div class="flex-1 flex flex-col gap-xs input-glow rounded-lg transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Name</label>
<input class="w-full bg-surface/50 border border-white/10 rounded-lg p-sm text-on-surface font-body-md placeholder:text-on-surface-variant/50 outline-none focus:ring-0 focus:border-transparent transition-colors" placeholder="Product Name" type="text"/>
</div>
<div class="w-1/3 flex flex-col gap-xs input-glow rounded-lg transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Price</label>
<div class="relative">
<span class="absolute left-sm top-1/2 -translate-y-1/2 text-primary font-h3">$</span>
<input class="w-full bg-surface/50 border border-white/10 rounded-lg p-sm pl-8 text-on-surface font-h3 placeholder:text-on-surface-variant/50 outline-none focus:ring-0 focus:border-transparent transition-colors" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<!-- Category -->
<div class="flex flex-col gap-xs input-glow rounded-lg transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Category</label>
<select class="w-full bg-surface/50 border border-white/10 rounded-lg p-sm text-on-surface font-body-md outline-none focus:ring-0 focus:border-transparent appearance-none">
<option disabled="" selected="" value="">Select Category</option>
<option value="mains">Mains</option>
<option value="drinks">Drinks</option>
<option value="sides">Sides</option>
</select>
</div>
<!-- Description -->
<div class="flex flex-col gap-xs input-glow rounded-lg transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Description</label>
<textarea class="w-full bg-surface/50 border border-white/10 rounded-lg p-sm text-on-surface font-body-md placeholder:text-on-surface-variant/50 outline-none focus:ring-0 focus:border-transparent resize-none" placeholder="Describe the dish..." rows="3"></textarea>
</div>
<!-- Media Upload Grid -->
<div class="grid grid-cols-2 gap-md mt-sm">
<!-- Image Upload -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Image</label>
<div class="border border-dashed border-white/20 rounded-lg h-32 flex flex-col items-center justify-center gap-sm bg-surface/30 hover:bg-surface/50 hover:border-primary/50 transition-all cursor-pointer group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">image</span>
<span class="font-label-caps text-label-caps text-on-surface-variant group-hover:text-primary transition-colors">Upload 2D</span>
</div>
</div>
<!-- 3D Upload -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-primary px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">view_in_ar</span> 3D Asset
                        </label>
<div class="border border-dashed border-primary/40 rounded-lg h-32 flex flex-col items-center justify-center gap-sm bg-primary/5 hover:bg-primary/10 hover:border-primary transition-all cursor-pointer group relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-primary text-[28px] group-hover:scale-110 transition-transform">deployed_code</span>
<span class="font-label-caps text-label-caps text-primary text-center px-2">Subir Archivo 3D<br/><span class="text-[9px] opacity-70">(GLB/GLTF)</span></span>
</div>
</div>
</div>
<!-- Submit Action -->
<button class="mt-md w-full bg-primary-container text-white font-h3 text-body-md py-md rounded-lg shadow-[0_0_15px_rgba(255,83,91,0.2)] hover:shadow-[0_0_25px_rgba(255,83,91,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined">save</span>
                    Save Product
                </button>
</form>
</section>
</main>
<!-- Floating Action Button (FAB) for Add (Contextual alternative to scrolling down) -->
<button class="fixed bottom-24 right-6 w-14 h-14 bg-primary-container text-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,83,91,0.4)] z-40 hover:scale-105 active:scale-95 transition-all md:hidden">
<span class="material-symbols-outlined text-[28px]">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center py-sm px-gutter bg-surface-container/90 dark:bg-surface-container/90 backdrop-blur-xl border-t border-white/10 rounded-t-xl shadow-[0_-5px_25px_rgba(0,0,0,0.5)] md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all" href="#">
<span class="material-symbols-outlined">restaurant_menu</span>
<span class="font-label-caps text-label-caps mt-1">Menu</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-label-caps text-label-caps mt-1">Cart</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-caps text-label-caps mt-1">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1 hover:text-primary-container transition-all scale-95 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-caps text-label-caps mt-1">Admin</span>
</a>
</nav>
</body></html>
